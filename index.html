<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旗球乐园 - Coach Byryden 增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Fredoka:wght@600&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
        }
        
        .title-font {
            font-family: 'Fredoka', sans-serif;
        }

        canvas {
            border: 10px solid #f59e0b;
            border-radius: 24px;
            box-shadow: 0 30px 60px -15px rgba(245, 158, 11, 0.5);
            background: #166534;
        }

        .animal-shadow {
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.4));
        }
    </style>
</head>
<body class="bg-[#0a6f3e] text-white overflow-x-hidden">
    <!-- 导航栏（保持不变） -->
    <nav class="bg-[#1a9f5e] border-b-4 border-[#f59e0b] py-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-14 h-14 bg-white rounded-3xl flex items-center justify-center text-5xl shadow-inner animate-bounce">🏈</div>
                <div>
                    <h1 class="title-font text-4xl font-bold tracking-wider">旗球乐园</h1>
                    <p class="text-[#f59e0b] -mt-1">Coach Byryden 增强动画版</p>
                </div>
            </div>
            <div class="hidden md:flex gap-8 text-xl font-bold">
                <a href="#home" onclick="navigateTo(0)" class="hover:text-[#f59e0b]">🏠 主页</a>
                <a href="#intro" onclick="navigateTo(1)" class="hover:text-[#f59e0b]">📖 介绍</a>
                <a href="#fouls" onclick="navigateTo(2)" class="hover:text-[#f59e0b]">🚫 犯规</a>
                <a href="#play" onclick="navigateTo(3)" class="hover:text-[#f59e0b]">⚡ 怎么打</a>
            </div>
        </div>
    </nav>

    <!-- 主页 Hero -->
    <section id="home" class="hero-bg py-12" style="background: linear-gradient(180deg, #0a6f3e 0%, #1a9f5e 100%);">
        <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-6">
                <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur px-8 py-4 rounded-full text-2xl">
                    🐻🐒🐴 一起玩旗球啦！
                </div>
                <h2 class="title-font text-6xl md:text-7xl font-bold leading-none">
                    超级好玩的<br>旗球动画教室
                </h2>
                <p class="text-2xl text-white/90">拖动小熊跑起来！看小动物们传球、拉旗、庆祝得分～<br>课堂上投影超吸睛！</p>
                
                <div class="flex gap-4 flex-wrap">
                    <button onclick="startDemo()" class="bg-[#f59e0b] hover:bg-amber-400 text-[#0a6f3e] px-10 py-6 rounded-3xl text-2xl font-bold flex items-center gap-3 transition-all active:scale-95">
                        ▶️ 自动演示进攻
                    </button>
                    <button onclick="resetAnimation()" class="border-4 border-white hover:bg-white/20 px-8 py-6 rounded-3xl text-2xl font-bold transition-all">
                        重置动画 🌀
                    </button>
                </div>
            </div>

            <!-- 增强版动画画布 -->
            <div class="relative flex justify-center">
                <canvas id="animationCanvas" width="680" height="460" class="animal-shadow"></canvas>
                <div id="scorePopup" class="absolute hidden top-8 left-1/2 -translate-x-1/2 bg-yellow-400 text-[#0a6f3e] font-bold text-3xl px-10 py-4 rounded-3xl shadow-2xl animate-bounce">
                    🎉 TOUCHDOWN！6分！
                </div>
            </div>
        </div>
    </section>

    <!-- Tab 区域（内容保持不变，仅调整样式） -->
    <div class="max-w-6xl mx-auto px-6 py-10">
        <!-- Tab 按钮略...（与之前相同） -->
        <!-- 这里为了简洁，我省略了 tab 按钮代码，你可以直接复制上一版中的 tab 部分 -->

        <!-- 内容区域保持上一版即可 -->
    </div>

    <script>
        let canvas, ctx;
        let animals = [];
        let football = { x: 0, y: 0, vx: 0, vy: 0, active: false };
        let particles = [];
        let confetti = [];
        let mouse = { x: 340, y: 230, dragging: false };
        let guideLine = null;
        let demoMode = false;
        let demoTimer = 0;

        class Animal {
            constructor(x, y, emoji, name, role, color = '#f59e0b') {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.emoji = emoji;
                this.name = name;
                this.role = role;
                this.angle = 0;           // 身体倾斜角度
                this.legSwing = 0;        // 腿部摆动
                this.isRunning = true;
                this.hasFlag = Math.random() > 0.5;
                this.stunned = 0;         // 被拉旗后晕眩时间
                this.happy = 0;           // 开心表情时间
            }

            update() {
                if (this.stunned > 0) {
                    this.stunned--;
                    this.angle = Math.sin(Date.now() / 80) * 0.3;
                    return;
                }

                // 自然跑动（轻微晃动）
                if (this.isRunning) {
                    this.legSwing = Math.sin(Date.now() / 120) * 0.4;
                    this.angle = Math.sin(Date.now() / 200) * 0.12;
                }

                // 小熊被拖动时
                if (this.emoji === '🐻' && mouse.dragging) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    this.x += dx * 0.25;
                    this.y += dy * 0.25;
                    this.angle = Math.atan2(dy, dx) * 0.6;
                    
                    // 拖动时的速度线粒子
                    if (Math.random() < 0.4) {
                        particles.push({
                            x: this.x - 20,
                            y: this.y + 20,
                            vx: -this.angle * 3 - 2,
                            vy: 1,
                            life: 18,
                            color: '#eab308',
                            size: 6
                        });
                    }
                } 
                // 其他动物自动移动
                else {
                    this.x = this.baseX + Math.sin(Date.now() / 800) * 35;
                    this.y = this.baseY + Math.cos(Date.now() / 1200) * 18;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 身体
                ctx.font = '62px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 12;
                ctx.fillText(this.emoji, 0, 0);

                // 表情（开心或晕）
                ctx.font = '22px system-ui';
                if (this.stunned > 0) {
                    ctx.fillText('😵', 12, -18);
                } else if (this.happy > 0) {
                    ctx.fillText('🥰', 15, -20);
                } else {
                    ctx.fillText('😊', 12, -18);
                }

                ctx.restore();

                // 名字 + 角色
                ctx.fillStyle = 'white';
                ctx.font = 'bold 15px Comic Neue';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, this.x, this.y + 52);

                // 旗子
                if (this.hasFlag && this.stunned === 0) {
                    ctx.fillStyle = '#f59e0b';
                    ctx.fillRect(this.x + 25, this.y - 22, 22, 10);
                    ctx.fillStyle = '#22c55e';
                    ctx.fillRect(this.x + 38, this.y - 30, 10, 22);
                }
            }
        }

        function createConfetti() {
            for (let i = 0; i < 80; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 100 - 50,
                    vx: (Math.random() - 0.5) * 12,
                    vy: Math.random() * 8 + 4,
                    rotation: Math.random() * 360,
                    color: ['#f59e0b', '#22c55e', '#ef4444', '#3b82f6'][Math.floor(Math.random()*4)],
                    size: Math.random() * 12 + 8
                });
            }
        }

        function throwFootball(fromAnimal, toAnimal) {
            football = {
                x: fromAnimal.x + 30,
                y: fromAnimal.y - 20,
                vx: (toAnimal.x - fromAnimal.x) / 25,
                vy: (toAnimal.y - fromAnimal.y - 40) / 25 - 3, // 抛物线
                active: true,
                target: toAnimal
            };
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 动态草地球场
            ctx.fillStyle = '#166534';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 草地纹理
            ctx.strokeStyle = '#14532d';
            ctx.lineWidth = 3;
            for (let i = 0; i < 25; i++) {
                let offset = Math.sin(Date.now() / 900 + i) * 4;
                ctx.beginPath();
                ctx.moveTo(30 + i * 25, 30);
                ctx.quadraticCurveTo(100 + i * 20, 80 + offset, 200 + i * 18, 380);
                ctx.stroke();
            }

            // 球场白线
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 7;
            for (let i = 1; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(40, i * 75);
                ctx.lineTo(canvas.width - 40, i * 75);
                ctx.stroke();
            }

            // 更新并绘制所有小动物
            animals.forEach(animal => {
                animal.update();
                animal.draw();
            });

            // 足球动画
            if (football.active) {
                football.x += football.vx;
                football.y += football.vy;
                football.vy += 0.25; // 重力

                ctx.font = '38px system-ui';
                ctx.fillText('🏈', football.x, football.y);

                // 接球判定
                if (football.target) {
                    const dx = football.x - football.target.x;
                    const dy = football.y - football.target.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 55) {
                        football.active = false;
                        football.target.happy = 80;   // 开心表情
                        // 接球成功粒子
                        for (let i = 0; i < 25; i++) {
                            particles.push({
                                x: football.x,
                                y: football.y,
                                vx: (Math.random()-0.5)*7,
                                vy: (Math.random()-0.5)*7 - 3,
                                life: 35,
                                color: '#eab308',
                                size: 9
                            });
                        }
                    }
                }
            }

            // 粒子系统（尘土、星星、彩带）
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += 0.2;
                
                ctx.globalAlpha = p.life / 35;
                ctx.fillStyle = p.color || '#facc15';
                ctx.fillRect(p.x, p.y, p.size || 8, p.size || 8);
                
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            // 彩带庆祝
            for (let i = confetti.length - 1; i >= 0; i--) {
                let c = confetti[i];
                c.x += c.vx;
                c.y += c.vy;
                c.vy += 0.25;
                c.rotation += 8;
                
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rotation * Math.PI / 180);
                ctx.fillStyle = c.color;
                ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size * 0.4);
                ctx.restore();
                
                if (c.y > canvas.height + 50) confetti.splice(i, 1);
            }

            // 引导线
            if (guideLine) {
                ctx.strokeStyle = '#fcd34d';
                ctx.lineWidth = 8;
                ctx.setLineDash([12, 18]);
                ctx.beginPath();
                ctx.moveTo(guideLine.x1, guideLine.y1);
                ctx.lineTo(guideLine.x2, guideLine.y2);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 自动演示逻辑
            if (demoMode) {
                demoTimer++;
                if (demoTimer % 120 === 0 && !football.active) {
                    throwFootball(animals[0], animals[1]);   // 小熊传给小猴
                }
                if (demoTimer > 400) {
                    demoMode = false;
                    demoTimer = 0;
                }
            }

            requestAnimationFrame(animate);
        }

        function initCanvas() {
            canvas = document.getElementById('animationCanvas');
            ctx = canvas.getContext('2d');

            animals = [
                new Animal(140, 180, '🐻', '小熊 四分卫', 'QB'),
                new Animal(320, 140, '🐒', '小猴 接球手', 'WR'),
                new Animal(480, 260, '🐴', '小马 跑卫', 'RB'),
                new Animal(520, 120, '🐆', '小豹 冲锋', 'Rusher'),
                new Animal(200, 320, '🦒', '小鹿 防守后卫', 'DB')
            ];

            // 鼠标交互
            canvas.addEventListener('mousedown', e => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
                mouse.dragging = true;
            });

            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });

            canvas.addEventListener('mouseup', () => {
                mouse.dragging = false;
                guideLine = null;
                
                // 偶尔触发得分庆祝
                if (Math.random() < 0.3 && animals[0].x > 500) {
                    createConfetti();
                    showScorePopup();
                }
            });

            // 点击拉旗
            canvas.addEventListener('click', e => {
                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;

                animals.forEach(animal => {
                    const dx = clickX - animal.x;
                    const dy = clickY - animal.y;
                    if (Math.hypot(dx, dy) < 70 && animal.hasFlag) {
                        animal.hasFlag = false;
                        animal.stunned = 65;
                        
                        // 拉旗粒子爆炸
                        for (let i = 0; i < 30; i++) {
                            particles.push({
                                x: animal.x + 30,
                                y: animal.y - 10,
                                vx: (Math.random() - 0.5) * 11,
                                vy: (Math.random() - 0.5) * 9 - 3,
                                life: 45,
                                color: '#22c55e'
                            });
                        }
                    }
                });
            });
        }

        function showScorePopup() {
            const popup = document.getElementById('scorePopup');
            popup.classList.remove('hidden');
            popup.style.animation = 'none';
            setTimeout(() => popup.style.animation = 'bounce 1.2s', 10);
            
            setTimeout(() => {
                popup.classList.add('hidden');
            }, 2200);
        }

        function startDemo() {
            demoMode = true;
            demoTimer = 0;
            // 立即传一次球
            if (animals.length > 1) throwFootball(animals[0], animals[1]);
        }

        function resetAnimation() {
            animals.forEach(a => {
                a.x = a.baseX;
                a.y = a.baseY;
                a.hasFlag = Math.random() > 0.4;
                a.stunned = 0;
                a.happy = 0;
            });
            football.active = false;
            particles = [];
            confetti = [];
        }

        // Tab 切换函数（同上一版）
        function switchTab(n) { /* ... 同上一个版本 ... */ }
        function navigateTo(n) { /* ... 同上一个版本 ... */ }

        window.onload = () => {
            initCanvas();
            animate();
            
            // 默认显示第一个 tab
            // switchTab(0);   // 如果你把 tab 内容也复制过来
            console.log('%c🚀 增强动画版旗球乐园已启动！更多动画效果已添加～', 'color:#fcd34d; font-size:16px');
        };
    </script>
</body>
</html>
